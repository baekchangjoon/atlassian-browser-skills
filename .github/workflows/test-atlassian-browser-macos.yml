name: test atlassian-browser-macos

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/atlassian-browser-macos/**'
      - '.github/workflows/test-atlassian-browser-macos.yml'
  push:
    branches: [main]
    paths:
      - 'skills/atlassian-browser-macos/**'
      - '.github/workflows/test-atlassian-browser-macos.yml'

jobs:
  # ── Transport tests on a real macOS runner ───────────────────────────────
  # Static + hermetic checks only: bash syntax, AppleScript compilation, arg
  # validation, and generated-JS validity (osascript is stubbed). Driving
  # Safari/Chrome is NOT tested — it needs a logged-in tab + TCC Automation
  # permission, which CI does not have.
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          bash --version | head -1
          osacompile -h 2>&1 | head -1 || true
          node --version
          python3 --version

      - name: Run macOS transport tests
        run: bash skills/atlassian-browser-macos/tests/test_macos.sh

  # ── Lint the shell wrappers ──────────────────────────────────────────────
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: skills/atlassian-browser-macos
          severity: error
