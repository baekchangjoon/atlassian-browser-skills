name: test atlassian-browser-windows

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/atlassian-browser-windows/**'
      - '.github/workflows/test-atlassian-browser-windows.yml'
  push:
    branches: [main]
    paths:
      - 'skills/atlassian-browser-windows/**'
      - '.github/workflows/test-atlassian-browser-windows.yml'

jobs:
  # ── PowerShell parse + error-path tests, under PS 5.1 and PS 7+ ───────────
  # NOTE: `shell:` cannot use the matrix context, so the step shell is fixed to
  # pwsh and the matrix host (powershell / pwsh) is invoked inside `run:`, where
  # the matrix context IS available. The test logic lives in tests/test_windows.ps1.
  test-powershell:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [powershell, pwsh]

    steps:
      - uses: actions/checkout@v4

      - name: Run Windows transport tests (${{ matrix.shell }})
        shell: pwsh
        run: >
          & ${{ matrix.shell }} -NoProfile -ExecutionPolicy Bypass
          -File skills/atlassian-browser-windows/tests/test_windows.ps1
          -PsHost ${{ matrix.shell }}

  # ── Python syntax check ───────────────────────────────────────────────────
  test-python:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Syntax check — atl_cdp.py
        run: python -m py_compile skills/atlassian-browser-windows/scripts/atl_cdp.py
        shell: pwsh

      - name: Syntax check — atl_playwright.py
        run: python -m py_compile skills/atlassian-browser-windows/scripts/atl_playwright.py
        shell: pwsh
